name: equipment_app
description: Bergdinge.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <3.16.8'

dependencies:
  flutter:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  cupertino_icons: ^1.0.2
  yaml: ^3.1.2
  firebase_core: ^2.15.0
  firebase_auth: ^4.7.1
  fl_chart: ^0.66.2
  go_router: ^13.2.1
  flutter_riverpod: ^2.3.3
  cloud_firestore: ^4.4.5
  google_sign_in: ^6.2.1
  firebase_storage: ^11.1.1
  url_launcher: ^6.1.12
  collection: ^1.18.0
  dismissible_page: ^1.0.2
  flutter_native_splash: ^2.3.10
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  build_runner: ^2.3.3

flutter_native_splash:
  color: "#6d9365"
  image: "assets/icon.png"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpeg"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon.jpeg"
    background_color: "#65936d"
    theme_color: "#ffffff"

flutter:

  uses-material-design: true

  assets:
    - pubspec.yaml
    - assets/items/
    - assets/
    - google_fonts/