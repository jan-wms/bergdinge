name: bergdinge
description: Bergdinge

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <3.19.5'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  flutter_launcher_icons: ^0.14.1
  cupertino_icons: ^1.0.2
  yaml: ^3.1.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  fl_chart: ^1.1.1
  go_router: ^17.0.1
  flutter_riverpod: ^3.1.0
  cloud_firestore: ^6.1.2
  google_sign_in: ^7.2.0
  url_launcher: ^6.1.12
  collection: ^1.18.0
  dismissible_page: ^1.0.2
  flutter_native_splash: ^2.3.10
  shimmer: ^3.0.0
  google_fonts: ^7.0.2
  flutter_svg: ^2.0.9
  http: ^1.6.0
  flutter_html: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  build_runner: ^2.3.3

flutter_native_splash:
  color: "#6d9365"
  image: "assets/icon.png"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpeg"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon.jpeg"
    background_color: "#65936d"
    theme_color: "#ffffff"

flutter:

  uses-material-design: true

  assets:
    - pubspec.yaml
    - assets/items/
    - assets/articles/
    - assets/
    - google_fonts/